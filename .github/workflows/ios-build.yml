name: iOS Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Tests
        run: |
          xcodebuild test \
            -project Pomlist.xcodeproj \
            -scheme Pomlist \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            -derivedDataPath build/test

      - name: Build Simulator App
        run: |
          xcodebuild build \
            -project Pomlist.xcodeproj \
            -scheme Pomlist \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/release \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive Unsigned App
        run: |
          xcodebuild archive \
            -project Pomlist.xcodeproj \
            -scheme Pomlist \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Pomlist.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package Artifacts
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/release/Build/Products/Release-iphonesimulator/Pomlist.app \
            build/Pomlist-simulator-app.zip
          ditto -c -k --sequesterRsrc --keepParent \
            build/Pomlist.xcarchive \
            build/Pomlist-xcarchive.zip

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pomlist-ios-build
          path: |
            build/Pomlist-simulator-app.zip
            build/Pomlist-xcarchive.zip
