name: Pomlist
options:
  bundleIdPrefix: me.0xpsyche
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: me.0xpsyche.Pomlist
    PRODUCT_NAME: Pomlist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_ASSET_PATHS: "\"Pomlist/Resources/Preview Content\""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
targets:
  Pomlist:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Pomlist
        excludes:
          - Resources
    resources:
      - path: Pomlist/Resources
    info:
      path: Pomlist/Info.plist
      properties:
        CFBundleDisplayName: Pomlist
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: 1
  PomlistTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    sources:
      - path: PomlistTests
    dependencies:
      - target: Pomlist
